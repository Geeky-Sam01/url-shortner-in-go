# Config file for [Air](https://github.com/cosmtrek/air) in TOML format

# Working directory
root = "."
tmp_dir = "tmp"

[build]
  # Just plain old go build
  cmd = "go build -o ./tmp/main.exe ./main.go"
  # Binary file yields from `cmd`
  bin = "tmp\\main.exe"
  # Watch these filename extensions.
  include_ext = ["go", "tpl", "tmpl", "html", "env"]
  # Ignore these filename extensions or directories.
  exclude_dir = ["assets", "tmp", "vendor", "frontend", "docs"]
  # Watch these directories if you want.
  include_dir = []
  # Exclude files.
  exclude_file = []
  # Exclude specific regular expressions.
  exclude_regex = ["_test.go"]
  # Exclude unchanged files.
  exclude_unchanged = true
  # Follow symlink for directories
  follow_symlink = true
  # This log file places in your tmp_dir.
  log = "air.log"
  # Delay to run build after a change is detected.
  delay = 500 # ms
  # Stop running old binary when build errors occur.
  stop_on_error = true
  # Send Interrupt signal instead of Kill on rebuild.
  send_interrupt = true
  # Kill process after this time if it ignores Interrupt.
  kill_delay = 500 # ms

[log]
  # Show log time
  time = true
  # Only show main log message
  main_only = false

[color]
  # Customize each part's color. If no color found, use the raw log.
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  # Delete tmp directory on exit
  clean_on_exit = true
