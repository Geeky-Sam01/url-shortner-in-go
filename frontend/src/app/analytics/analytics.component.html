<div class="analytics-header">
  <h1 class="heading-xl">Analytics Overview</h1>
  <p class="subtitle">Track your link performance and geographic metrics in real-time.</p>
</div>

<div class="analytics-grid">
  <!-- Clicks Box -->
  <div class="bento-card insight-box">
    <div class="insight-meta">
      <span class="insight-label">TOTAL CLICKS</span>
      <span class="growth-badge">+12%</span>
    </div>
    <div class="insight-value">12,482</div>
    <div class="insight-sparkline">
      <svg viewBox="0 0 100 30" class="sparkline-svg">
        <path d="M0,25 Q15,10 30,22 T60,5 T90,15 L100,5" fill="none" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"></path>
      </svg>
    </div>
    <div class="insight-footer">Compared to 11,145 last month</div>
  </div>
  
  <!-- Locations Box -->
  <div class="bento-card insight-box">
    <span class="insight-label">TOP LOCATIONS</span>
    <div class="locations-list">
      <div class="location-item">
        <div class="location-info">
          <span class="flag">🇺🇸</span>
          <span class="country-name">United States</span>
        </div>
        <div class="location-bar-wrapper">
          <div class="location-bar-fill" style="width: 45%"></div>
        </div>
        <span class="percent">45%</span>
      </div>
      
      <div class="location-item">
        <div class="location-info">
          <span class="flag">🇬🇧</span>
          <span class="country-name">United Kingdom</span>
        </div>
        <div class="location-bar-wrapper">
          <div class="location-bar-fill" style="width: 28%"></div>
        </div>
        <span class="percent">28%</span>
      </div>
      
      <div class="location-item">
        <div class="location-info">
          <span class="flag">🇩🇪</span>
          <span class="country-name">Germany</span>
        </div>
        <div class="location-bar-wrapper">
          <div class="location-bar-fill" style="width: 15%"></div>
        </div>
        <span class="percent">15%</span>
      </div>
    </div>
    <button class="geo-report-btn">Full Geographic Report</button>
  </div>
</div>
